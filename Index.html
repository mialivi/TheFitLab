<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Fitness Plan</title>
    <link rel="stylesheet" href="style.css">
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>Welcome to Your Personalized Fitness Plan</h1>
        <p>Answer the questions below to get a custom plan!</p>
    </header>

    <main>
        <form id="fitnessForm">
            <!-- Example input fields -->
            <label>Gender:</label>
            <select id="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>

            <label>Age:</label>
            <input type="number" id="age" placeholder="Enter your age" required>

            <label>Weight (lbs):</label>
            <input type="number" id="weight" placeholder="Enter weight" required>

            <label>Height (inches):</label>
            <input type="number" id="height" placeholder="Enter height" required>

            <label>Fitness Goal:</label>
            <select id="goal">
                <option value="fat_loss">Fat Loss</option>
                <option value="muscle_gain">Muscle Gain</option>
                <option value="recomposition">Recomposition</option>
            </select>

            <label>Gym Access:</label>
            <select id="gym">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <label>Experience Level:</label>
            <select id="experience">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>

            <label>Available Workout Time (minutes/week):</label>
            <input type="number" id="time" placeholder="Enter minutes" required>

            <button type="button" onclick="generatePlan()">Generate Plan</button>
        </form>

        <section id="results">
            <h2>Your Custom Plan</h2>
            <div id="planOutput">Your results will appear here.</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
